name: UsageWidget
options:
  bundleIdPrefix: systems.edmundlim
  deploymentTarget:
    iOS: "27.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: DUU8J39BA7
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Avoid signing extra debug dylibs (common CodeSign/errSecInternalComponent site on device).
    ENABLE_DEBUG_DYLIB: NO
packages: {}
targets:
  UsageWidget:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Core
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: systems.edmundlim.UsageWidget
        INFOPLIST_KEY_CFBundleDisplayName: UsageWidget
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UsageWidgetKeychainAccessGroup: "$(AppIdentifierPrefix)systems.edmundlim.UsageWidget.shared"
        CODE_SIGN_ENTITLEMENTS: UsageWidget.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: DUU8J39BA7
        CODE_SIGN_IDENTITY: "Apple Development"
        PROVISIONING_PROFILE_SPECIFIER: "UsageWidget Dev 20260718"
    entitlements:
      path: UsageWidget.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.systems.edmundlim.usagewidget
        keychain-access-groups:
          - "$(AppIdentifierPrefix)systems.edmundlim.UsageWidget.shared"
    dependencies:
      - target: UsageWidgetWidget
        embed: true
    scheme:
      testTargets:
        - UsageWidgetCoreTests

  UsageWidgetWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
        excludes:
          - Info.plist
      - path: Sources/Core
      - path: Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: UsageWidget
        UsageWidgetKeychainAccessGroup: "$(AppIdentifierPrefix)systems.edmundlim.UsageWidget.shared"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: systems.edmundlim.UsageWidget.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Widget/Info.plist
        INFOPLIST_KEY_UsageWidgetKeychainAccessGroup: "$(AppIdentifierPrefix)systems.edmundlim.UsageWidget.shared"
        CODE_SIGN_ENTITLEMENTS: UsageWidgetWidget.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: DUU8J39BA7
        CODE_SIGN_IDENTITY: "Apple Development"
        PROVISIONING_PROFILE_SPECIFIER: "UsageWidget Widget Dev 20260718"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    entitlements:
      path: UsageWidgetWidget.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.systems.edmundlim.usagewidget
        keychain-access-groups:
          - "$(AppIdentifierPrefix)systems.edmundlim.UsageWidget.shared"

  UsageWidgetCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CoreTests
    dependencies:
      - target: UsageWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: systems.edmundlim.UsageWidget.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DUU8J39BA7
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UsageWidget.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/UsageWidget"
        BUNDLE_LOADER: "$(TEST_HOST)"
