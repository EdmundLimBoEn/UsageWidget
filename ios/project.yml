name: UsageWidget
options:
  bundleIdPrefix: systems.edmundlim
  deploymentTarget:
    iOS: "27.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages: {}
targets:
  UsageWidget:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: systems.edmundlim.UsageWidget
        INFOPLIST_KEY_CFBundleDisplayName: UsageWidget
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: UsageWidget.entitlements
    entitlements:
      path: UsageWidget.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.systems.edmundlim.usagewidget
        keychain-access-groups:
          - $(AppIdentifierPrefix)systems.edmundlim.UsageWidget
    dependencies:
      - target: UsageWidgetWidget
        embed: true
    scheme:
      testTargets:
        - UsageWidgetCoreTests

  UsageWidgetWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
        excludes:
          - Info.plist
      - path: Sources/Core
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: UsageWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: systems.edmundlim.UsageWidget.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: UsageWidgetWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    entitlements:
      path: UsageWidgetWidget.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.systems.edmundlim.usagewidget
        keychain-access-groups:
          - $(AppIdentifierPrefix)systems.edmundlim.UsageWidget

  UsageWidgetCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CoreTests
    dependencies:
      - target: UsageWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: systems.edmundlim.UsageWidget.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/UsageWidget.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/UsageWidget"
        BUNDLE_LOADER: "$(TEST_HOST)"
